<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>靴おすすめ診断</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border-radius: 16px; padding: 2rem 1.5rem; max-width: 480px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    .brand { font-size: 11px; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.3rem; line-height: 1.4; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 1.75rem; line-height: 1.6; }
    .progress-wrap { margin-bottom: 1.75rem; }
    .progress-bar { height: 5px; background: #eee; border-radius: 99px; overflow: hidden; margin-bottom: 0.5rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #5b50d6, #7c74e0); border-radius: 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .step-label { font-size: 12px; color: #aaa; text-align: right; }
    .question-wrap { min-height: 80px; }
    .question-inner { opacity: 1; transform: translateY(0); transition: opacity 0.3s ease, transform 0.3s ease; }
    .question-inner.exit { opacity: 0; transform: translateY(-16px); }
    .question-inner.enter { opacity: 0; transform: translateY(20px); }
    .question-inner.enter-active { opacity: 1; transform: translateY(0); transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.2,0.8,0.3,1); }
    .question { font-size: 17px; font-weight: 700; color: #1a1a1a; line-height: 1.6; margin-bottom: 1.75rem; }
    .btn-row { display: flex; gap: 10px; }
    .yn-btn { flex: 1; padding: 14px 10px; border-radius: 12px; border: 1.5px solid #ddd; background: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.12s; display: flex; align-items: center; justify-content: center; gap: 6px; color: #333; }
    .yn-btn:active { transform: scale(0.96); }
    .yn-btn.tapped-yes { border-color: #5b50d6; color: #5b50d6; background: #f0eeff; }
    .yn-btn.tapped-no  { border-color: #888; color: #888; background: #f7f7f7; }
    #result-screen { opacity: 0; transform: translateY(24px); }
    #result-screen.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.2,0.8,0.3,1); }
    .sec-label { font-size: 11px; color: #aaa; letter-spacing: 0.05em; margin: 1.1rem 0 0.5rem; }
    .shoe-card { border: 1.5px solid #eee; border-radius: 14px; padding: 1.25rem; margin-bottom: 0.75rem; background: #fff; opacity: 0; transform: translateY(20px); animation: cardIn 0.4s cubic-bezier(0.2,0.8,0.3,1) forwards; }
    .shoe-card:nth-child(1){animation-delay:0.05s} .shoe-card:nth-child(2){animation-delay:0.13s} .shoe-card:nth-child(3){animation-delay:0.21s} .shoe-card:nth-child(4){animation-delay:0.29s}
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .shoe-card.featured { border-color: #5b50d6; border-width: 2px; }
    .best-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; background: #f0eeff; color: #3C3489; margin-bottom: 0.6rem; }
    .shoe-img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 0.75rem; border-radius: 8px; background: #fafafa; }
    .shoe-name { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.15rem; }
    .shoe-brand-label { font-size: 12px; color: #aaa; }
    .retry-btn { width: 100%; padding: 13px; border-radius: 12px; border: 1.5px solid #ddd; background: transparent; color: #888; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 0.75rem; transition: background 0.15s; }
    .retry-btn:hover { background: #f7f7f7; }
  </style>
</head>
<body>
  <div class="card">
    <div id="quiz-screen">
      <div class="brand">靴おすすめ診断</div>
      <div class="title">あなたにぴったりの一足を</div>
      <div class="subtitle">4つの質問に答えるだけで、あなたにおすすめの靴をご提案します。</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        <div class="step-label" id="step-label">質問 1 / 4</div>
      </div>
      <div class="question-wrap">
        <div class="question-inner" id="question-inner">
          <div class="question" id="question-text"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="yn-btn" id="btn-yes" onclick="answer(true)">✓ はい</button>
        <button class="yn-btn" id="btn-no" onclick="answer(false)">✕ いいえ</button>
      </div>
    </div>
    <div id="result-screen" style="display:none">
      <div class="brand">診断結果</div>
      <div class="title">あなたへのおすすめ</div>
      <div id="result-list"></div>
      <button class="retry-btn" onclick="restart()">↩ もう一度診断する</button>
    </div>
  </div>

      const inner=document.getElementById("question-inner");
      inner.classList.add("exit");
      setTimeout(()=>{document.getElementById("quiz-screen").style.display="none";showResult();transitioning=false;},300);
    }
    function buildCard(key,featured){
      const s=shoeData[key];
      const card=document.createElement("div");
      card.className="shoe-card"+(featured?" featured":"");
      let html=featured?'<div class="best-badge">特におすすめ</div>':"";
      html+='<img class="shoe-img" src="'+images[key]+'" alt="'+s.name+'">';
      html+='<div class="shoe-name">'+s.name+'</div>';
      html+='<div class="shoe-brand-label">'+s.brand+'</div>';
      card.innerHTML=html;return card;
    }
    function buildSection(label){const d=document.createElement("div");d.className="sec-label";d.textContent=label;return d;}
    function showResult(){
      const q1=ans[0],q2=ans[1],q3=ans[2],q4=ans[3];
      const nbTop=q1||q2||q3;
      const list=document.getElementById("result-list");
      list.innerHTML="";
      if(nbTop){
        list.appendChild(buildSection("特におすすめ"));list.appendChild(buildCard("nb",true));
        list.appendChild(buildSection("その他のおすすめ"));
        ["nike","stan"].forEach(k=>list.appendChild(buildCard(k,false)));
      }else if(q4){
        list.appendChild(buildSection("おすすめ"));
        ["nb","asics","nike"].forEach(k=>list.appendChild(buildCard(k,false)));
      }else{
        list.appendChild(buildSection("すべておすすめです"));
        ["nb","asics","nike","stan"].forEach(k=>list.appendChild(buildCard(k,false)));
      }
      const rs=document.getElementById("result-screen");
      rs.style.display="block";void rs.offsetWidth;rs.classList.add("visible");
    }
    function restart(){
      current=0;ans=[];transitioning=false;
      const rs=document.getElementById("result-screen");
      rs.classList.remove("visible");rs.style.display="none";
      document.getElementById("question-inner").className="question-inner";
      resetBtns();setButtons(true);
      document.getElementById("quiz-screen").style.display="block";
      showQ(false);
    }
    showQ(false);
  </script>
</body>
</html>
